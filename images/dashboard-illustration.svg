<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181C26"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </linearGradient>
    <radialGradient id="glow4" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg4)"/>
  <rect width="600" height="450" fill="url(#glow4)"/>

  <!-- Laptop / dashboard frame -->
  <rect x="80" y="70" width="440" height="280" rx="14" fill="#181C26" stroke="#3A4150" stroke-width="2.5"/>
  <rect x="100" y="92" width="400" height="234" rx="6" fill="#0F1117"/>

  <!-- Dashboard header -->
  <circle cx="118" cy="106" r="4" fill="#EF4444"/>
  <circle cx="132" cy="106" r="4" fill="#FBBF24"/>
  <circle cx="146" cy="106" r="4" fill="#22C55E"/>
  <text x="300" y="110" font-family="Inter, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Access Dashboard — Live</text>

  <!-- Door status rows -->
  <g font-family="Inter, sans-serif" font-size="11">
    <rect x="115" y="125" width="370" height="32" rx="6" fill="#181C26"/>
    <circle cx="130" cy="141" r="4" fill="#22C55E"/>
    <text x="142" y="145" fill="#F8FAFC">Main Entrance</text>
    <text x="450" y="145" fill="#4ADE80" text-anchor="end">Locked</text>

    <rect x="115" y="162" width="370" height="32" rx="6" fill="#181C26"/>
    <circle cx="130" cy="178" r="4" fill="#22C55E"/>
    <text x="142" y="182" fill="#F8FAFC">Parking Gate</text>
    <text x="450" y="182" fill="#4ADE80" text-anchor="end">Locked</text>

    <rect x="115" y="199" width="370" height="32" rx="6" fill="rgba(37,99,235,0.12)" stroke="#2563EB" stroke-width="1"/>
    <circle cx="130" cy="215" r="4" fill="#3B82F6"/>
    <text x="142" y="219" fill="#F8FAFC">Server Room</text>
    <text x="450" y="219" fill="#60A5FA" text-anchor="end">Unlocked · 2 min</text>

    <rect x="115" y="236" width="370" height="32" rx="6" fill="#181C26"/>
    <circle cx="130" cy="252" r="4" fill="#22C55E"/>
    <text x="142" y="256" fill="#F8FAFC">Rooftop Access</text>
    <text x="450" y="256" fill="#4ADE80" text-anchor="end">Locked</text>
  </g>

  <!-- Activity log line graph -->
  <polyline points="115,300 150,290 185,295 220,275 255,285 290,265 325,278 360,260 395,270 430,255 465,262 485,250"
    fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="115" y="295" font-family="Inter, sans-serif" font-size="9" fill="#475569"></text>

  <!-- Laptop base -->
  <path d="M 60 350 L 540 350 L 565 380 L 35 380 Z" fill="#232833" stroke="#3A4150" stroke-width="2"/>

  <!-- Floating notification card -->
  <g transform="translate(440,150)">
    <rect x="0" y="0" width="130" height="60" rx="10" fill="#181C26" stroke="#2563EB" stroke-width="2"/>
    <circle cx="20" cy="22" r="9" fill="rgba(37,99,235,0.2)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="36" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#F8FAFC">New Access</text>
    <text x="36" y="33" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">J. Martinez — 9:41 AM</text>
    <text x="20" y="48" font-family="Inter, sans-serif" font-size="9" fill="#64748B">Front Door</text>
  </g>

  <g stroke="#2563EB" stroke-width="2" opacity="0.5" fill="none">
    <path d="M 30 30 L 30 55 M 30 30 L 55 30"/>
    <path d="M 570 30 L 570 55 M 570 30 L 545 30"/>
    <path d="M 30 420 L 30 395 M 30 420 L 55 420"/>
    <path d="M 570 420 L 570 395 M 570 420 L 545 420"/>
  </g>
</svg>
