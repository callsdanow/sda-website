    <rect x="216" y="300" width="168" height="18" rx="2" fill="#1E2330" stroke="#3A4150"/>
    <circle cx="370" cy="309" r="3" fill="#22C55E"/>
    <rect x="216" y="324" width="168" height="18" rx="2" fill="#1E2330" stroke="#3A4150"/>
