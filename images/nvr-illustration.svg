  </g>
  <line x1="420" y1="240" x2="470" y2="175" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.5"/>

  <!-- Floating data labels -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#64748B">
