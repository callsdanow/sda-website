<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181C26"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </linearGradient>
    <radialGradient id="glow2" cx="30%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg2)"/>
  <rect width="600" height="450" fill="url(#glow2)"/>

  <!-- Server rack -->
  <rect x="180" y="60" width="240" height="340" rx="10" fill="#181C26" stroke="#3A4150" stroke-width="2.5"/>

