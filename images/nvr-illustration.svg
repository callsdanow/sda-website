    <g fill="#1E2330" stroke="#3A4150" stroke-width="1">
      <rect x="212" y="244" width="14" height="18" rx="2"/>
      <rect x="232" y="244" width="14" height="18" rx="2"/>
      <rect x="252" y="244" width="14" height="18" rx="2"/>
      <rect x="272" y="244" width="14" height="18" rx="2"/>
      <rect x="292" y="244" width="14" height="18" rx="2"/>
      <rect x="312" y="244" width="14" height="18" rx="2"/>
      <rect x="332" y="244" width="14" height="18" rx="2"/>
      <rect x="352" y="244" width="14" height="18" rx="2"/>
      <rect x="372" y="244" width="14" height="18" rx="2"/>
