    <rect x="200" y="133" width="200" height="38" rx="4" fill="#0F1117" stroke="#2563EB" stroke-width="1.5" opacity="0.7"/>
    <circle cx="216" cy="152" r="4" fill="#22C55E"/>
    <circle cx="232" cy="152" r="4" fill="#22C55E"/>
    <rect x="250" y="146" width="120" height="12" rx="2" fill="#232833"/>

