<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181C26"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg3)"/>
  <rect width="600" height="450" fill="url(#glow3)"/>

  <!-- Door frame -->
  <rect x="60" y="40" width="280" height="380" fill="#181C26" stroke="#272B36" stroke-width="3"/>
  <rect x="80" y="60" width="240" height="340" fill="#1E2330" stroke="#272B36" stroke-width="2"/>
  <circle cx="300" cy="230" r="6" fill="#3A4150"/>

  <!-- Reader panel mounted on wall beside door -->
  <g transform="translate(380,150)">
    <rect x="0" y="0" width="110" height="160" rx="14" fill="#181C26" stroke="#2563EB" stroke-width="2.5"/>
    <rect x="14" y="18" width="82" height="55" rx="8" fill="#0F1117" stroke="#3A4150" stroke-width="1.5"/>
    <!-- NFC wave rings -->
    <g stroke="#3B82F6" fill="none" stroke-width="2">
      <path d="M 35 60 a 20 20 0 0 1 40 0" opacity="0.9"/>
      <path d="M 28 60 a 27 27 0 0 1 54 0" opacity="0.55"/>
      <path d="M 21 60 a 34 34 0 0 1 68 0" opacity="0.3"/>
    </g>
    <!-- Status LED -->
    <circle cx="55" cy="96" r="7" fill="#22C55E"/>
    <text x="55" y="118" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">ACCESS</text>
    <text x="55" y="132" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#4ADE80" text-anchor="middle">GRANTED</text>
    <!-- Keypad dots -->
    <g fill="#3A4150">
      <circle cx="30" cy="148" r="2.5"/><circle cx="55" cy="148" r="2.5"/><circle cx="80" cy="148" r="2.5"/>
    </g>
  </g>

  <!-- Key fob being presented -->
  <g transform="translate(395,330) rotate(-12)">
    <rect x="0" y="0" width="70" height="44" rx="8" fill="#232833" stroke="#2563EB" stroke-width="2"/>
    <circle cx="35" cy="22" r="11" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="35" cy="22" r="4" fill="#3B82F6"/>
  </g>
  <path d="M 420 320 Q 410 280 365 245" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 5" fill="none" opacity="0.5"/>

  <!-- Lock indicator at door -->
  <g transform="translate(290,210)">
    <rect x="0" y="6" width="22" height="18" rx="3" fill="#181C26" stroke="#3A4150" stroke-width="1.5"/>
    <path d="M4,6 v-6 a7,7 0 0 1 14,0 v6" fill="none" stroke="#3A4150" stroke-width="2.5"/>
  </g>

  <g font-family="Inter, sans-serif" font-size="12" fill="#64748B">
    <text x="380" y="335">⬤ Key fob</text>
    <text x="380" y="355">⬤ PIN keypad</text>
    <text x="380" y="375">⬤ Mobile credential</text>
  </g>

  <g stroke="#2563EB" stroke-width="2" opacity="0.5" fill="none">
    <path d="M 30 30 L 30 55 M 30 30 L 55 30"/>
    <path d="M 570 30 L 570 55 M 570 30 L 545 30"/>
    <path d="M 30 420 L 30 395 M 30 420 L 55 420"/>
    <path d="M 570 420 L 570 395 M 570 420 L 545 420"/>
  </g>
</svg>
